[build]
  cmd            = "go build -o ./tmp/server ./cmd/server"
  bin            = "./tmp/server"
  full_bin       = "./tmp/server"
  include_ext    = ["go", "toml"]
  exclude_dir    = ["tmp", "gen", "vendor"]
  exclude_regex  = ["_test\\.go"]
  delay          = 500      # ファイル変更後の待機 ms
  stop_on_error  = true
  rerun          = false

[log]
  time = true

[color]
  main    = "magenta"
  watcher = "cyan"
  build   = "yellow"
  runner  = "green"

[misc]
  clean_on_exit = true
