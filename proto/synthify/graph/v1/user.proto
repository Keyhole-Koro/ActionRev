syntax = "proto3";

package synthify.graph.v1;

option go_package = "github.com/synthify/backend/gen/synthify/graph/v1;graphv1";

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_MEMBER = 1;
  USER_ROLE_ADMIN = 2;
  USER_ROLE_DEV = 3;
}

message User {
  string user_id = 1;
  string email = 2;
  string display_name = 3;
  repeated UserRole roles = 4;
}

message SyncUserRequest {
  string id_token = 1;
}

message SyncUserResponse {
  User user = 1;
}

message GetMeRequest {}

service UserService {
  rpc SyncUser(SyncUserRequest) returns (SyncUserResponse);
  rpc GetMe(GetMeRequest) returns (User);
}
