syntax = "proto3";

package synthify.graph.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/synthify/backend/gen/synthify/graph/v1;graphv1";

enum WorkspaceRole {
  WORKSPACE_ROLE_UNSPECIFIED = 0;
  WORKSPACE_ROLE_OWNER = 1;
  WORKSPACE_ROLE_EDITOR = 2;
  WORKSPACE_ROLE_VIEWER = 3;
}

message Workspace {
  string workspace_id = 1;
  string name = 2;
  google.protobuf.Timestamp created_at = 3;
}

message WorkspaceMember {
  string workspace_id = 1;
  string user_id = 2;
  WorkspaceRole role = 3;
}

message CreateWorkspaceRequest {
  string name = 1;
}

message GetWorkspaceRequest {
  string workspace_id = 1;
}

message ListWorkspacesRequest {}

message ListWorkspacesResponse {
  repeated Workspace workspaces = 1;
}

message AddWorkspaceMemberRequest {
  string workspace_id = 1;
  string user_id = 2;
  WorkspaceRole role = 3;
}

message AddWorkspaceMemberResponse {
  WorkspaceMember member = 1;
}

service WorkspaceService {
  rpc CreateWorkspace(CreateWorkspaceRequest) returns (Workspace);
  rpc GetWorkspace(GetWorkspaceRequest) returns (Workspace);
  rpc ListWorkspaces(ListWorkspacesRequest) returns (ListWorkspacesResponse);
  rpc AddWorkspaceMember(AddWorkspaceMemberRequest) returns (AddWorkspaceMemberResponse);
}
