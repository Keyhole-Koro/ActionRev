syntax = "proto3";

package actionrev.graph.v1;

option go_package = "github.com/actionrev/backend/gen/actionrev/graph/v1;graphv1";

message Document {
  string document_id = 1;
  string filename = 2;
  string gcs_uri = 3;
  string mime_type = 4;
  int64 file_size = 5;
  DocumentStatus status = 6;
  string created_at = 7;
  string updated_at = 8;
}

message DocumentChunk {
  string document_id = 1;
  string chunk_id = 2;
  int64 chunk_index = 3;
  string text = 4;
  string source_filename = 5;
  int64 source_page = 6;
  int64 source_offset_start = 7;
  int64 source_offset_end = 8;
}

message Node {
  string id = 1;
  string document_id = 2;
  string label = 3;
  NodeType type = 4;
  string description = 5;
  string summary_html = 6;
  string source_chunk_id = 7;
  double confidence = 8;
  string created_at = 9;
}

message Edge {
  string id = 1;
  string document_id = 2;
  string source = 3;
  string target = 4;
  EdgeType type = 5;
  string description = 6;
  double weight = 7;
  string source_chunk_id = 8;
  string created_at = 9;
}

message Graph {
  string document_id = 1;
  repeated Node nodes = 2;
  repeated Edge edges = 3;
}

message Job {
  string job_id = 1;
  string document_id = 2;
  JobType type = 3;
  JobStatus status = 4;
  string created_at = 5;
  string started_at = 6;
  string completed_at = 7;
  string error_message = 8;
}

message NormalizationTool {
  string tool_id = 1;
  string name = 2;
  string version = 3;
  string description = 4;
  string entrypoint = 5;
  repeated string allowed_file_types = 6;
  ToolApprovalStatus approval_status = 7;
  string created_by = 8;
  string created_at = 9;
  string updated_at = 10;
}

message NormalizationToolRun {
  string run_id = 1;
  string tool_id = 2;
  string tool_version = 3;
  string document_id = 4;
  ToolRunMode mode = 5;
  ToolRunStatus status = 6;
  string stdout = 7;
  string stderr = 8;
  string diff_summary = 9;
  string output_uri = 10;
  string created_at = 11;
  string started_at = 12;
  string completed_at = 13;
}

enum DocumentStatus {
  DOCUMENT_STATUS_UNSPECIFIED = 0;
  DOCUMENT_STATUS_UPLOADED = 1;
  DOCUMENT_STATUS_PROCESSING = 2;
  DOCUMENT_STATUS_COMPLETED = 3;
  DOCUMENT_STATUS_FAILED = 4;
}

enum NodeType {
  NODE_TYPE_UNSPECIFIED = 0;
  NODE_TYPE_ABSTRACT = 1;
  NODE_TYPE_CONCRETE = 2;
}

enum EdgeType {
  EDGE_TYPE_UNSPECIFIED = 0;
  EDGE_TYPE_ABSTRACT_TO_CONCRETE = 1;
  EDGE_TYPE_RELATED_TO = 2;
}

enum JobType {
  JOB_TYPE_UNSPECIFIED = 0;
  JOB_TYPE_PROCESS_DOCUMENT = 1;
  JOB_TYPE_REPROCESS_DOCUMENT = 2;
}

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_QUEUED = 1;
  JOB_STATUS_RUNNING = 2;
  JOB_STATUS_SUCCEEDED = 3;
  JOB_STATUS_FAILED = 4;
}

enum ToolApprovalStatus {
  TOOL_APPROVAL_STATUS_UNSPECIFIED = 0;
  TOOL_APPROVAL_STATUS_DRAFT = 1;
  TOOL_APPROVAL_STATUS_REVIEWED = 2;
  TOOL_APPROVAL_STATUS_APPROVED = 3;
  TOOL_APPROVAL_STATUS_DEPRECATED = 4;
}

enum ToolRunMode {
  TOOL_RUN_MODE_UNSPECIFIED = 0;
  TOOL_RUN_MODE_DRY_RUN = 1;
  TOOL_RUN_MODE_APPLY = 2;
}

enum ToolRunStatus {
  TOOL_RUN_STATUS_UNSPECIFIED = 0;
  TOOL_RUN_STATUS_QUEUED = 1;
  TOOL_RUN_STATUS_RUNNING = 2;
  TOOL_RUN_STATUS_SUCCEEDED = 3;
  TOOL_RUN_STATUS_FAILED = 4;
}
