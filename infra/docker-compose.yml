version: "3.9"

# ローカル開発環境
# Vertex AI (Gemini) はエミュレータが存在しないため、実際の GCP プロジェクトを使用する
# Gemini キャッシュ (GEMINI_CACHE_ENABLED=true) で API コストを節約できる
# Stripe は本家テストモードキー (sk_test_...) をそのまま使用する

services:
  # ---------------------------------------------------------------------------
  # Go バックエンド (Connect RPC)
  # Air によるホットリロード前提。backend/ に Dockerfile.dev と .air.toml を配置すること
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    env_file:
      - .env.local
    environment:
      BIGQUERY_EMULATOR_HOST: "bigquery-emulator:9050"
      STORAGE_EMULATOR_HOST: "http://fake-gcs:4443"
      FIREBASE_AUTH_EMULATOR_HOST: "firebase-emulator:9099"
      FIREBASE_AUTH_EMULATOR: "true"
    depends_on:
      bigquery-emulator:
        condition: service_healthy
      fake-gcs:
        condition: service_started
      firebase-emulator:
        condition: service_started
    volumes:
      - ../backend:/app
      - go-mod-cache:/root/go/pkg/mod
      # Gemini レスポンスキャッシュ: リポジトリルートの .gemini-cache/ をマウント
      - ../.gemini-cache:/app/.gemini-cache
    networks:
      - actionrev

  # ---------------------------------------------------------------------------
  # Cloud Storage エミュレータ
  # GCS 署名付き URL の発行も対応 (fake-gcs-server >= 1.45)
  # ---------------------------------------------------------------------------
  fake-gcs:
    image: fsouza/fake-gcs-server:1.49
    ports:
      - "4443:4443"
    command:
      - -scheme=http
      - -port=4443
      - -public-host=fake-gcs:4443
      - -backend=memory
    volumes:
      - fake-gcs-data:/storage
    networks:
      - actionrev

  # ---------------------------------------------------------------------------
  # BigQuery エミュレータ
  # REST API (9050) + Storage API (9060) を公開
  # ---------------------------------------------------------------------------
  bigquery-emulator:
    image: ghcr.io/goccy/bigquery-emulator:0.6
    ports:
      - "9050:9050"
      - "9060:9060"
    command:
      - --project=actionrev-local
      - --dataset=graph
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - "http://localhost:9050/bigquery/v2/projects/actionrev-local/datasets"
      interval: 5s
      timeout: 3s
      retries: 15
    networks:
      - actionrev

  # ---------------------------------------------------------------------------
  # Firebase Auth エミュレータ
  # firebase.json はリポジトリルートに配置する
  # ---------------------------------------------------------------------------
  firebase-emulator:
    image: andreysenov/firebase-tools:latest
    ports:
      - "9099:9099"   # Auth emulator
      - "4000:4000"   # Emulator UI
    command: >
      firebase emulators:start --only auth --project actionrev-local
    environment:
      FIREBASE_TOKEN: "local"   # CI 用 token (ローカルは不要だが型合わせ)
    volumes:
      - ../firebase.json:/home/node/firebase.json:ro
      - firebase-emulator-data:/home/node/.cache/firebase
    working_dir: /home/node
    networks:
      - actionrev

volumes:
  fake-gcs-data:
  firebase-emulator-data:
  go-mod-cache:

networks:
  actionrev:
    driver: bridge
