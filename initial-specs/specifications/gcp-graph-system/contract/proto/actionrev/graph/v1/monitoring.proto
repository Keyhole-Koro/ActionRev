syntax = "proto3";

package actionrev.graph.v1;

option go_package = "github.com/actionrev/backend/gen/actionrev/graph/v1;graphv1";

// MonitoringService は dev ロールを持つ管理者のみアクセス可能
service MonitoringService {
  rpc GetPipelineStats(GetPipelineStatsRequest) returns (PipelineMetrics);
  rpc GetExtractionStats(GetExtractionStatsRequest) returns (ExtractionMetrics);
  rpc GetEvaluationTrend(GetEvaluationTrendRequest) returns (EvaluationMetrics);
  rpc ListFailedDocuments(ListFailedDocumentsRequest) returns (ErrorMetrics);
}

message GetPipelineStatsRequest {
  string since = 1; // ISO 8601 日付（省略時: 過去30日）
}

message StageLatency {
  string stage = 1;
  double avg_sec = 2;
  double p95_sec = 3;
}

message PipelineMetrics {
  repeated StageLatency stage_latencies = 1;
  int32 completed_count = 2;
  int32 failed_count = 3;
  int32 total_llm_calls = 4;
  double total_cost_usd = 5;
}

message GetExtractionStatsRequest {
  string document_id = 1; // 省略時は全ドキュメント集計
}

message ExtractionMetrics {
  map<string, int32> nodes_by_level = 1;    // "0" -> 3, "1" -> 12, ...
  map<string, int32> nodes_by_category = 2; // "concept" -> 58, ...
  int32 pass1_node_count = 3;
  int32 pass2_node_count = 4;
  int32 merged_node_count = 5;
  int32 added_edge_count = 6;
}

message WeeklyMetric {
  string week = 1; // "2026-W12"
  double precision = 2;
  double recall = 3;
  map<string, double> level_accuracy = 4; // "0" -> 0.95, ...
}

message GetEvaluationTrendRequest {
  int32 weeks = 1; // 取得週数（デフォルト: 8）
}

message EvaluationMetrics {
  repeated WeeklyMetric metrics = 1;
}

message FailedDocument {
  string document_id = 1;
  string filename = 2;
  string error_stage = 3;
  string error_message = 4;
  string failed_at = 5;
}

message ListFailedDocumentsRequest {
  string since = 1;
  int32 limit = 2;
}

message ErrorMetrics {
  repeated FailedDocument documents = 1;
}
