syntax = "proto3";

package actionrev.graph.v1;

option go_package = "github.com/actionrev/backend/gen/actionrev/graph/v1;graphv1";

service JobService {
  rpc GetJobStatus(GetJobStatusRequest) returns (GetJobStatusResponse);
}

message Job {
  string job_id = 1;
  string document_id = 2;
  JobType type = 3;
  JobStatus status = 4;
  string created_at = 5;
  string started_at = 6;
  string completed_at = 7;
  string error_message = 8;
}

enum JobType {
  JOB_TYPE_UNSPECIFIED = 0;
  JOB_TYPE_PROCESS_DOCUMENT = 1;
  JOB_TYPE_REPROCESS_DOCUMENT = 2;
}

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_QUEUED = 1;
  JOB_STATUS_RUNNING = 2;
  JOB_STATUS_SUCCEEDED = 3;
  JOB_STATUS_FAILED = 4;
}

message GetJobStatusRequest {
  string job_id = 1;
}

message GetJobStatusResponse {
  Job job = 1;
}
