syntax = "proto3";

package actionrev.graph.v1;

option go_package = "github.com/actionrev/backend/gen/actionrev/graph/v1;graphv1";

import "actionrev/graph/v1/common.proto";

service NodeService {
  rpc GetGraphEntityDetail(GetGraphEntityDetailRequest) returns (GetGraphEntityDetailResponse);
}

message EntityRef {
  string workspace_id = 1;
  NodeScope scope = 2;
  string id = 3;
  string document_id = 4;
}

message GraphEntityEvidence {
  repeated DocumentChunk source_chunks = 1;
  repeated string source_document_ids = 2;
  repeated Edge supporting_edges = 3;
}

message GraphEntityDetail {
  EntityRef ref = 1;
  Node node = 2;
  repeated Edge related_edges = 3;
  GraphEntityEvidence evidence = 4;
  repeated Node representative_nodes = 5;
}

message GetGraphEntityDetailRequest {
  EntityRef target_ref = 1;
  bool resolve_aliases = 2;
}

message GetGraphEntityDetailResponse {
  GraphEntityDetail detail = 1;
}
