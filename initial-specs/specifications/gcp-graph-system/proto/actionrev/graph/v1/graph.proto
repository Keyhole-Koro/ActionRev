syntax = "proto3";

package actionrev.graph.v1;

option go_package = "github.com/actionrev/backend/gen/actionrev/graph/v1;graphv1";

import "actionrev/graph/v1/graph_types.proto";

service GraphService {
  rpc GetGraph(GetGraphRequest) returns (GetGraphResponse);
  rpc ExpandNeighbors(ExpandNeighborsRequest) returns (ExpandNeighborsResponse);
  rpc FindPaths(FindPathsRequest) returns (FindPathsResponse);
}

message GetGraphRequest {
  string workspace_id = 1;
  string document_id = 2;
  repeated NodeCategory category_filters = 3;
  repeated int32 level_filters = 4;
  int32 limit = 5;
  string source_filename_filter = 6;
  bool resolve_aliases = 7;
  repeated EdgeType edge_type_filters = 8;
}

message GetGraphResponse {
  Graph graph = 1;
}

message ExpandNeighborsRequest {
  string workspace_id = 1;
  string seed_node_id = 2;
  int32 max_depth = 3;
  repeated EdgeType edge_type_filters = 4;
  int32 limit_per_hop = 5;
  bool resolve_aliases = 6;
  bool cross_document = 7;
  repeated string document_ids = 8;
}

message ExpandNeighborsResponse {
  Graph graph = 1;
  string seed_node_id = 2;
  int32 depth = 3;
}

message FindPathsRequest {
  string workspace_id = 1;
  string source_node_id = 2;
  string target_node_id = 3;
  int32 max_depth = 4;
  repeated EdgeType edge_type_filters = 5;
  int32 limit = 6;
  bool cross_document = 7;
  repeated string document_ids = 8;
}

message GraphPath {
  repeated string node_ids = 1;
  repeated string edge_ids = 2;
  int32 hop_count = 3;
  repeated string supporting_edge_ids = 4;
  repeated string source_document_ids = 5;
}

message FindPathsResponse {
  Graph graph = 1;
  repeated GraphPath paths = 2;
}
