syntax = "proto3";

package actionrev.graph.v1;

option go_package = "github.com/actionrev/backend/gen/actionrev/graph/v1;graphv1";

import "actionrev/graph/v1/common.proto";

service GraphService {
  rpc GetGraph(GetGraphRequest) returns (GetGraphResponse);
  rpc ExpandNeighbors(ExpandNeighborsRequest) returns (ExpandNeighborsResponse);
  rpc FindPaths(FindPathsRequest) returns (FindPathsResponse);
  rpc GetPipelineStats(GetPipelineStatsRequest) returns (GetPipelineStatsResponse);
  rpc GetExtractionStats(GetExtractionStatsRequest) returns (GetExtractionStatsResponse);
  rpc GetEvaluationTrend(GetEvaluationTrendRequest) returns (GetEvaluationTrendResponse);
  rpc ListFailedDocuments(ListFailedDocumentsRequest) returns (ListFailedDocumentsResponse);
}

message GetGraphRequest {
  string workspace_id = 1;
  string document_id = 2;
  repeated NodeCategory category_filters = 3;
  repeated int32 level_filters = 4;
  int32 limit = 5;
  string source_filename_filter = 6;
  bool resolve_aliases = 7;
  repeated EdgeType edge_type_filters = 8;
}

message ExpandNeighborsRequest {
  string workspace_id = 1;
  string seed_node_id = 2;
  int32 max_depth = 3;
  repeated EdgeType edge_type_filters = 4;
  int32 limit_per_hop = 5;
  bool resolve_aliases = 6;
  bool cross_document = 7;
  repeated string document_ids = 8;
}

message ExpandNeighborsResponse {
  Graph graph = 1;
  string seed_node_id = 2;
  int32 depth = 3;
}

message FindPathsRequest {
  string workspace_id = 1;
  string source_node_id = 2;
  string target_node_id = 3;
  int32 max_depth = 4;
  repeated EdgeType edge_type_filters = 5;
  int32 limit = 6;
  bool cross_document = 7;
  repeated string document_ids = 8;
}

message GraphPath {
  repeated string node_ids = 1;
  repeated string edge_ids = 2;
  int32 hop_count = 3;
  repeated string supporting_edge_ids = 4;
  repeated string source_document_ids = 5;
}

message FindPathsResponse {
  Graph graph = 1;
  repeated GraphPath paths = 2;
}

message GetGraphResponse {
  Graph graph = 1;
}

// --- Stats RPCs ---

message GetPipelineStatsRequest {
  string since = 1; // ISO 8601 日付（省略時: 過去30日）
}

message StageLatency {
  string stage = 1;
  double avg_sec = 2;
  double p95_sec = 3;
}

message GetPipelineStatsResponse {
  repeated StageLatency stage_latencies = 1;
  int32 completed_count = 2;
  int32 failed_count = 3;
  int32 total_llm_calls = 4;
  double total_cost_usd = 5;
}

message GetExtractionStatsRequest {
  string document_id = 1; // 省略時は全ドキュメント集計
}

message GetExtractionStatsResponse {
  map<string, int32> nodes_by_level = 1;    // "0" -> 3, "1" -> 12, ...
  map<string, int32> nodes_by_category = 2; // "concept" -> 58, ...
  int32 pass1_node_count = 3;
  int32 pass2_node_count = 4;
  int32 merged_node_count = 5;
  int32 added_edge_count = 6;
}

message WeeklyMetric {
  string week = 1; // "2026-W12"
  double precision = 2;
  double recall = 3;
  map<string, double> level_accuracy = 4; // "0" -> 0.95, ...
}

message GetEvaluationTrendRequest {
  int32 weeks = 1; // 取得週数（デフォルト: 8）
}

message GetEvaluationTrendResponse {
  repeated WeeklyMetric metrics = 1;
}

message FailedDocument {
  string document_id = 1;
  string filename = 2;
  string error_stage = 3;
  string error_message = 4;
  string failed_at = 5;
}

message ListFailedDocumentsRequest {
  string since = 1;
  int32 limit = 2;
}

message ListFailedDocumentsResponse {
  repeated FailedDocument documents = 1;
}
